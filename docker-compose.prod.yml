services:
  db:
    image: postgres:18.3
    env_file: .env.prod
    volumes:
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:7-alpine

  web:
    build: .
    command: gunicorn pulsenotify.wsgi:application --bind 0.0.0.0:8000 --workers 3
    expose:
      - "8000"
    env_file: .env.prod
    depends_on:
      - db
      - redis
      
  nginx:
    image: nginx:alpine
    ports:
      - 80:80
    volumes:
      - ./nginx/prod.nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

  celery-worker:
    build: .
    command: celery -A pulsenotify worker --loglevel=info
    env_file: .env.prod
    depends_on:
      - db
      - redis
  
  celery-beat:
    build: .
    command: celery -A pulsenotify beat --loglevel=info
    env_file: .env.prod
    depends_on:
      - db
      - redis

volumes:
  pgdata:

